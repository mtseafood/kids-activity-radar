name: daily-scrape

on:
  schedule:
    - cron: "0 22 * * *" # UTC 22:00 = 台灣時間每天早上 06:00
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Keep previous result for diffing
        run: cp activities.json previous.json 2>/dev/null || true

      - name: Run scraper
        run: python scraper.py --cities 台中市 苗栗縣 彰化縣 南投縣 --days 60

      - name: Notify Telegram about new activities
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python notify_telegram.py previous.json activities.json "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add activities.json
          if git diff --cached --quiet; then
            echo "資料無變化，不需 commit"
          else
            git commit -m "chore: daily scrape $(date -u +%Y-%m-%d)"
            git push
          fi
