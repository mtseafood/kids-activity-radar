<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>親子活動雷達｜2~6 歲體驗活動分類入口</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai+TC&family=Baloo+2:wght@500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div class="wrap">
  <header>
    <svg class="sun" viewBox="0 0 100 100" aria-hidden="true">
      <g stroke="#F2933A" stroke-width="5" stroke-linecap="round">
        <line x1="50" y1="2"  x2="50" y2="16"/><line x1="50" y1="84" x2="50" y2="98"/>
        <line x1="2"  y1="50" x2="16" y2="50"/><line x1="84" y1="50" x2="98" y2="50"/>
        <line x1="16" y1="16" x2="26" y2="26"/><line x1="74" y1="74" x2="84" y2="84"/>
        <line x1="16" y1="84" x2="26" y2="74"/><line x1="74" y1="26" x2="84" y2="16"/>
      </g>
      <circle cx="50" cy="50" r="22" fill="#F4C544" stroke="#33291F" stroke-width="3"/>
    </svg>
    <div class="title-row">
      <h1>親子活動雷達</h1>
      <div class="subtitle">給 <b>2~6 歲</b> 小寶貝的體驗活動清單</div>
    </div>
    <div class="stats" id="stats"></div>
  </header>

  <div class="section-label">✨ 選個分類開始逛</div>
  <main class="cat-grid" id="catGrid"></main>

  <div class="section-label">🗺️ 特別企劃</div>
  <div class="cat-grid" id="specialGrid"></div>

  <div id="message"></div>

  <footer>資料來源：Accupass、KKday、Niceday、大紀元、台中市政府文化局開放資料｜報名前請以原網站資訊為準</footer>
</div>

<script src="assets/app.js"></script>
<script>
"use strict";
const $ = id => document.getElementById(id);

async function load() {
  let data;
  try {
    const resp = await fetch("activities.json", { cache: "no-store" });
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    data = await resp.json();
  } catch (e) {
    $("message").innerHTML = `
      <div class="error-box">
        <strong>讀不到 activities.json 😢</strong><br>
        ${location.protocol === "file:"
          ? "瀏覽器不允許直接從檔案讀取資料，請在專案資料夾啟動一個小伺服器："
          : "請先執行爬蟲產生資料："}<br>
        <code>python scraper.py</code>　然後　<code>python -m http.server 8000</code><br>
        再開啟 <code>http://localhost:8000</code>
      </div>`;
    return;
  }

  const all = data.activities || [];

  // 統計貼紙
  const freeCount = all.filter(a => a.is_free).length;
  const cityCount = new Set(all.map(a => a.location_city).filter(Boolean)).size;
  $("stats").innerHTML = `
    <span class="stat"><span class="dot" style="background:var(--red)"></span>共 <strong>${all.length}</strong> 個活動</span>
    <span class="stat"><span class="dot" style="background:var(--green)"></span><strong>${freeCount}</strong> 個免費</span>
    <span class="stat"><span class="dot" style="background:var(--blue)"></span>遍及 <strong>${cityCount}</strong> 個縣市</span>
    <span class="stat"><span class="dot" style="background:var(--orange)"></span>更新：<strong>${(data.scraped_at || "").slice(0, 10)}</strong></span>`;

  // 各分類數量
  const count = tag => all.filter(a => (a.tags || []).includes(tag)).length;

  // 分類磚
  const grid = $("catGrid");
  // 「全部活動」磚永遠擺第一個
  grid.appendChild(tile({
    key: "all", icon: "🌈", color: "var(--ink)",
    name: "全部活動", blurb: "一次瀏覽所有活動，自由搜尋篩選",
  }, all.length, "category.html?cat=all"));

  for (const c of CATEGORIES) {
    const n = count(c.key);
    if (n === 0) continue; // 沒有活動的分類先不顯示
    grid.appendChild(tile({ ...c, name: c.key }, n,
      "category.html?cat=" + encodeURIComponent(c.key)));
  }

  // 特別企劃磚
  const sg = $("specialGrid");
  for (const s of SPECIAL) {
    sg.appendChild(tile(s, null, s.href));
  }
}

function tile(c, n, href) {
  const a = document.createElement("a");
  a.className = "cat-tile";
  a.href = href;
  a.style.setProperty("--tile-c", c.color);
  const countHtml = n != null
    ? `<span class="count">${n} 個活動</span>`
    : `<span class="count muted">看更多 ↗</span>`;
  a.innerHTML = `
    <div class="ic">${c.icon}</div>
    <div class="name">${esc(c.name)}</div>
    <div class="blurb">${esc(c.blurb)}</div>
    ${countHtml}
    <span class="arrow">→</span>`;
  return a;
}

load();
</script>
</body>
</html>
