<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>親子活動雷達｜2~4 歲體驗活動瀏覽器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai+TC&family=Baloo+2:wght@500;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --paper: #FBF5E9;
  --paper-deep: #F3EAD7;
  --ink: #33291F;
  --ink-soft: #7A6C5B;
  --card: #FFFDF7;
  --red: #E8604C;
  --orange: #F2933A;
  --yellow: #F4C544;
  --green: #7CB069;
  --blue: #5B9BC9;
  --pink: #E889A8;
  --purple: #9D7FBE;
  --gray: #B9AE9E;
  --shadow: 4px 4px 0 rgba(51, 41, 31, .9);
  --shadow-sm: 3px 3px 0 rgba(51, 41, 31, .9);
  --radius: 14px;
  --font-hand: "LXGW WenKai TC", "Kaiti TC", serif;
  --font-round: "Baloo 2", "LXGW WenKai TC", sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-hand);
  background-color: var(--paper);
  /* 紙張紋理：細點 + 淡格線 */
  background-image:
    radial-gradient(rgba(51,41,31,.045) 1px, transparent 1px),
    linear-gradient(rgba(51,41,31,.03) 1px, transparent 1px);
  background-size: 22px 22px, 100% 34px;
  color: var(--ink);
  min-height: 100vh;
}

.wrap { max-width: 1180px; margin: 0 auto; padding: 28px 20px 80px; }

/* ============ Header ============ */
header { position: relative; margin-bottom: 26px; }
.title-row { display: flex; align-items: flex-end; gap: 18px; flex-wrap: wrap; }
h1 {
  font-family: var(--font-hand);
  font-size: clamp(2rem, 5vw, 3rem);
  font-weight: 700;
  letter-spacing: .06em;
  line-height: 1.1;
  position: relative;
  display: inline-block;
}
/* 蠟筆底線 */
h1::after {
  content: "";
  position: absolute; left: -2px; right: -6px; bottom: 2px;
  height: .38em;
  background: var(--yellow);
  z-index: -1;
  transform: rotate(-1deg);
  border-radius: 3px;
}
.subtitle { font-size: 1rem; color: var(--ink-soft); padding-bottom: .5em; }
.subtitle b { color: var(--red); font-weight: 700; }

.sun {
  position: absolute; top: -6px; right: 0;
  width: 64px; height: 64px;
  animation: spin 40s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
@media (max-width: 640px) { .sun { display: none; } }

/* ============ 統計貼紙 ============ */
.stats { display: flex; gap: 12px; margin-top: 18px; flex-wrap: wrap; }
.stat {
  background: var(--card);
  border: 2.5px solid var(--ink);
  border-radius: 999px;
  padding: 6px 16px 6px 12px;
  font-size: .92rem;
  box-shadow: var(--shadow-sm);
  display: flex; align-items: center; gap: 8px;
  transform: rotate(-.5deg);
}
.stat:nth-child(2) { transform: rotate(.7deg); }
.stat:nth-child(3) { transform: rotate(-.4deg); }
.stat .dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--ink); }
.stat strong { font-family: var(--font-round); font-weight: 800; }

/* ============ 篩選區 ============ */
.filters {
  background: var(--card);
  border: 3px solid var(--ink);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 18px;
  margin: 26px 0 10px;
  position: relative;
}
/* 紙膠帶 */
.filters::before {
  content: "";
  position: absolute; top: -12px; left: 38px;
  width: 92px; height: 24px;
  background: rgba(244, 197, 68, .75);
  transform: rotate(-3deg);
  border-left: 2px dashed rgba(51,41,31,.25);
  border-right: 2px dashed rgba(51,41,31,.25);
}
.filter-grid {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1fr;
  gap: 12px;
  margin-bottom: 14px;
}
@media (max-width: 820px) { .filter-grid { grid-template-columns: 1fr 1fr; } }
@media (max-width: 480px) { .filter-grid { grid-template-columns: 1fr; } }

.field label {
  display: block;
  font-size: .82rem;
  color: var(--ink-soft);
  margin-bottom: 4px;
  letter-spacing: .08em;
}
.field input, .field select {
  width: 100%;
  font-family: var(--font-hand);
  font-size: 1rem;
  color: var(--ink);
  background: var(--paper);
  border: 2.5px solid var(--ink);
  border-radius: 10px;
  padding: 8px 12px;
  outline: none;
  transition: box-shadow .15s, transform .15s;
}
.field input:focus, .field select:focus {
  box-shadow: 3px 3px 0 var(--blue);
  transform: translate(-1px, -1px);
}

.chip-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
.chip-row .row-label { font-size: .82rem; color: var(--ink-soft); letter-spacing: .08em; margin-right: 2px; }
.chip {
  font-family: var(--font-hand);
  font-size: .9rem;
  border: 2.5px solid var(--ink);
  border-radius: 999px;
  background: var(--card);
  color: var(--ink);
  padding: 4px 14px;
  cursor: pointer;
  transition: transform .12s, box-shadow .12s;
  position: relative;
}
.chip:hover { transform: translate(-1px, -1px); box-shadow: var(--shadow-sm); }
.chip.on { box-shadow: var(--shadow-sm); transform: translate(-1px,-1px); font-weight: 700; }
.chip.on::after { content: " ✓"; }

.toggle-row { display: flex; gap: 16px; align-items: center; margin-top: 14px; flex-wrap: wrap; }
.toggle {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: .95rem; cursor: pointer; user-select: none;
}
.toggle input { display: none; }
.toggle .box {
  width: 20px; height: 20px;
  border: 2.5px solid var(--ink); border-radius: 6px;
  background: var(--paper);
  display: grid; place-items: center;
  font-size: .8rem; font-weight: 800;
  color: transparent;
  transition: background .12s;
}
.toggle input:checked + .box { background: var(--green); color: var(--card); }
.reset-btn {
  margin-left: auto;
  font-family: var(--font-hand);
  font-size: .9rem;
  background: none; border: none;
  color: var(--ink-soft);
  cursor: pointer;
  text-decoration: underline dashed;
  text-underline-offset: 4px;
}
.reset-btn:hover { color: var(--red); }

/* ============ 結果列 ============ */
.result-bar {
  display: flex; align-items: baseline; gap: 10px;
  margin: 22px 4px 14px;
  flex-wrap: wrap;
}
.result-bar .count { font-family: var(--font-round); font-size: 1.5rem; font-weight: 800; color: var(--red); }
.result-bar .label { color: var(--ink-soft); }

/* ============ 卡片 ============ */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 20px;
}
.card {
  background: var(--card);
  border: 3px solid var(--ink);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 16px 16px 14px;
  display: flex; flex-direction: column; gap: 10px;
  position: relative;
  transition: transform .15s ease, box-shadow .15s ease;
  animation: pop .35s ease backwards;
}
.card:hover { transform: translate(-2px, -3px) rotate(-.3deg); box-shadow: 6px 7px 0 rgba(51,41,31,.9); }
@keyframes pop {
  from { opacity: 0; transform: translateY(14px) scale(.97); }
  to   { opacity: 1; transform: none; }
}

.card-top { display: flex; gap: 12px; align-items: flex-start; }
.date-block {
  flex-shrink: 0;
  width: 64px;
  border: 2.5px solid var(--ink);
  border-radius: 10px;
  overflow: hidden;
  text-align: center;
  font-family: var(--font-round);
  background: var(--paper);
}
.date-block .m { background: var(--red); color: var(--card); font-size: .72rem; font-weight: 700; padding: 2px 0; letter-spacing: .1em; }
.date-block .d { font-size: 1.5rem; font-weight: 800; line-height: 1.3; }
.date-block .range { font-size: .62rem; color: var(--ink-soft); padding-bottom: 3px; }
.date-block.unknown .d { font-size: .95rem; padding: 8px 0; color: var(--ink-soft); }

.card h3 { font-size: 1.05rem; font-weight: 700; line-height: 1.45; flex: 1; }
.card h3 a { color: inherit; text-decoration: none; }
.card h3 a:hover { text-decoration: underline wavy var(--blue); text-underline-offset: 4px; }

.meta { display: flex; flex-direction: column; gap: 4px; font-size: .88rem; color: var(--ink-soft); }
.meta .line { display: flex; gap: 6px; align-items: baseline; }
.meta .ico { flex-shrink: 0; }
.meta .city-tag { color: var(--ink); font-weight: 700; }

.tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: auto; }
.tag {
  font-size: .76rem;
  border: 2px solid var(--ink);
  border-radius: 999px;
  padding: 1px 10px;
  font-weight: 700;
  color: var(--ink);
}

.card-foot {
  display: flex; align-items: center; justify-content: space-between;
  border-top: 2px dashed rgba(51,41,31,.25);
  padding-top: 10px;
  font-size: .8rem; color: var(--ink-soft);
}
.go-link {
  font-family: var(--font-hand);
  font-size: .88rem; font-weight: 700;
  color: var(--ink);
  background: var(--yellow);
  border: 2.5px solid var(--ink);
  border-radius: 999px;
  padding: 3px 14px;
  text-decoration: none;
  box-shadow: 2px 2px 0 rgba(51,41,31,.9);
  transition: transform .12s, box-shadow .12s;
}
.go-link:hover { transform: translate(-1px,-1px); box-shadow: 3px 4px 0 rgba(51,41,31,.9); }

/* 免費貼紙 */
.free-sticker {
  position: absolute; top: -12px; right: -10px;
  width: 52px; height: 52px;
  background: var(--green);
  border: 2.5px solid var(--ink);
  border-radius: 50%;
  display: grid; place-items: center;
  color: var(--card);
  font-weight: 700; font-size: .92rem;
  transform: rotate(8deg);
  box-shadow: var(--shadow-sm);
}
.price-sticker {
  position: absolute; top: -12px; right: -10px;
  background: var(--orange);
  border: 2.5px solid var(--ink);
  border-radius: 999px;
  padding: 4px 12px;
  color: var(--card);
  font-family: var(--font-round);
  font-weight: 800; font-size: .85rem;
  transform: rotate(3deg);
  box-shadow: var(--shadow-sm);
}

/* ============ 載入更多 / 空狀態 ============ */
.more-row { text-align: center; margin-top: 34px; }
.more-btn {
  font-family: var(--font-hand);
  font-size: 1.05rem; font-weight: 700;
  background: var(--blue); color: var(--card);
  border: 3px solid var(--ink);
  border-radius: 999px;
  padding: 10px 34px;
  cursor: pointer;
  box-shadow: var(--shadow);
  transition: transform .12s, box-shadow .12s;
}
.more-btn:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 rgba(51,41,31,.9); }

.empty {
  text-align: center;
  padding: 70px 20px;
  color: var(--ink-soft);
  font-size: 1.1rem;
}
.empty .face { font-size: 3rem; display: block; margin-bottom: 12px; }

.error-box {
  background: var(--card);
  border: 3px solid var(--red);
  border-radius: var(--radius);
  box-shadow: 4px 4px 0 var(--red);
  padding: 26px;
  margin-top: 30px;
  line-height: 1.9;
}
.error-box code {
  background: var(--paper-deep);
  border: 1.5px solid rgba(51,41,31,.3);
  border-radius: 6px;
  padding: 2px 8px;
  font-size: .9em;
}

footer {
  margin-top: 60px;
  text-align: center;
  color: var(--ink-soft);
  font-size: .85rem;
}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <svg class="sun" viewBox="0 0 100 100" aria-hidden="true">
      <g stroke="#F2933A" stroke-width="5" stroke-linecap="round">
        <line x1="50" y1="2"  x2="50" y2="16"/><line x1="50" y1="84" x2="50" y2="98"/>
        <line x1="2"  y1="50" x2="16" y2="50"/><line x1="84" y1="50" x2="98" y2="50"/>
        <line x1="16" y1="16" x2="26" y2="26"/><line x1="74" y1="74" x2="84" y2="84"/>
        <line x1="16" y1="84" x2="26" y2="74"/><line x1="74" y1="26" x2="84" y2="16"/>
      </g>
      <circle cx="50" cy="50" r="22" fill="#F4C544" stroke="#33291F" stroke-width="3"/>
    </svg>
    <div class="title-row">
      <h1>親子活動雷達</h1>
      <div class="subtitle">給 <b>2~4 歲</b> 小寶貝的體驗活動清單</div>
    </div>
    <div class="stats" id="stats"></div>
  </header>

  <section class="filters" id="filters" hidden>
    <div class="filter-grid">
      <div class="field">
        <label for="q">關鍵字搜尋</label>
        <input type="search" id="q" placeholder="活動名稱、地點、主辦單位…">
      </div>
      <div class="field">
        <label for="city">縣市</label>
        <select id="city"><option value="">全部縣市</option></select>
      </div>
      <div class="field">
        <label for="age">孩子年齡</label>
        <select id="age">
          <option value="">不限</option>
          <option value="2">2 歲</option>
          <option value="3">3 歲</option>
          <option value="4">4 歲</option>
          <option value="5">5 歲</option>
          <option value="6">6 歲</option>
        </select>
      </div>
      <div class="field">
        <label for="sort">排序</label>
        <select id="sort">
          <option value="rank">推薦排序</option>
          <option value="date">日期最近</option>
          <option value="price">價格低到高</option>
        </select>
      </div>
    </div>
    <div class="chip-row" id="tagChips"><span class="row-label">活動類型</span></div>
    <div class="toggle-row">
      <label class="toggle"><input type="checkbox" id="freeOnly"><span class="box">✓</span>只看免費活動</label>
      <label class="toggle"><input type="checkbox" id="datedOnly"><span class="box">✓</span>只看有確定日期</label>
      <button class="reset-btn" id="reset">清除全部篩選</button>
    </div>
  </section>

  <div class="result-bar" id="resultBar" hidden>
    <span class="count" id="count">0</span><span class="label">個活動</span>
    <span class="label" id="scrapedAt" style="margin-left:auto"></span>
  </div>

  <main class="grid" id="grid"></main>
  <div class="more-row" id="moreRow" hidden>
    <button class="more-btn" id="moreBtn">再看更多 ↓</button>
  </div>
  <div id="message"></div>

  <footer>資料來源：Accupass、KKday、大紀元、台中市政府文化局開放資料｜報名前請以原網站資訊為準</footer>
</div>

<script>
"use strict";

const TAG_COLORS = {
  "職業體驗": "var(--red)",
  "體驗課":   "var(--blue)",
  "DIY手作":  "var(--orange)",
  "農場體驗": "var(--green)",
  "烹飪課":   "var(--yellow)",
  "藝術課":   "var(--pink)",
  "感統課":   "var(--purple)",
  "室內":     "var(--gray)",
};
const PAGE_SIZE = 48;

let all = [];        // 原始活動（保留推薦排序）
let view = [];       // 篩選後
let shown = 0;       // 已渲染數量

const $ = id => document.getElementById(id);

async function load() {
  let data;
  try {
    const resp = await fetch("activities.json", { cache: "no-store" });
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    data = await resp.json();
  } catch (e) {
    $("message").innerHTML = `
      <div class="error-box">
        <strong>讀不到 activities.json 😢</strong><br>
        ${location.protocol === "file:"
          ? "瀏覽器不允許直接從檔案讀取資料，請在專案資料夾啟動一個小伺服器："
          : "請先執行爬蟲產生資料："}<br>
        <code>python scraper.py</code>　然後　<code>python -m http.server 8000</code><br>
        再開啟 <code>http://localhost:8000</code>
      </div>`;
    return;
  }

  all = (data.activities || []).map((a, i) => ({ ...a, _rank: i }));
  $("scrapedAt").textContent = "資料更新：" + (data.scraped_at || "").replace("T", " ");

  buildStats();
  buildCityOptions();
  buildTagChips();
  bindEvents();
  $("filters").hidden = false;
  $("resultBar").hidden = false;
  applyFilters();
}

function buildStats() {
  const freeCount = all.filter(a => a.is_free).length;
  const cityCount = new Set(all.map(a => a.location_city).filter(Boolean)).size;
  $("stats").innerHTML = `
    <span class="stat"><span class="dot" style="background:var(--red)"></span>共 <strong>${all.length}</strong> 個活動</span>
    <span class="stat"><span class="dot" style="background:var(--green)"></span><strong>${freeCount}</strong> 個免費</span>
    <span class="stat"><span class="dot" style="background:var(--blue)"></span>遍及 <strong>${cityCount}</strong> 個縣市</span>`;
}

function buildCityOptions() {
  const counts = {};
  for (const a of all) if (a.location_city) counts[a.location_city] = (counts[a.location_city] || 0) + 1;
  const cities = Object.entries(counts).sort((x, y) => y[1] - x[1]);
  for (const [city, n] of cities) {
    const opt = document.createElement("option");
    opt.value = city;
    opt.textContent = `${city}（${n}）`;
    $("city").appendChild(opt);
  }
}

function buildTagChips() {
  const row = $("tagChips");
  for (const tag of Object.keys(TAG_COLORS)) {
    if (tag === "室內") continue;
    const btn = document.createElement("button");
    btn.className = "chip";
    btn.textContent = tag;
    btn.dataset.tag = tag;
    btn.style.setProperty("--chip-c", TAG_COLORS[tag]);
    btn.addEventListener("click", () => {
      btn.classList.toggle("on");
      btn.style.background = btn.classList.contains("on") ? TAG_COLORS[tag] : "";
      btn.style.color = btn.classList.contains("on") ? "var(--card)" : "";
      applyFilters();
    });
    row.appendChild(btn);
  }
}

function bindEvents() {
  for (const id of ["q", "city", "age", "sort", "freeOnly", "datedOnly"])
    $(id).addEventListener("input", applyFilters);
  $("reset").addEventListener("click", () => {
    $("q").value = ""; $("city").value = ""; $("age").value = ""; $("sort").value = "rank";
    $("freeOnly").checked = false; $("datedOnly").checked = false;
    document.querySelectorAll(".chip.on").forEach(c => {
      c.classList.remove("on"); c.style.background = ""; c.style.color = "";
    });
    applyFilters();
  });
  $("moreBtn").addEventListener("click", () => render(false));
}

function applyFilters() {
  const q = $("q").value.trim().toLowerCase();
  const city = $("city").value;
  const age = $("age").value ? parseInt($("age").value, 10) : null;
  const freeOnly = $("freeOnly").checked;
  const datedOnly = $("datedOnly").checked;
  const tags = [...document.querySelectorAll(".chip.on")].map(c => c.dataset.tag);

  view = all.filter(a => {
    if (q) {
      const hay = [a.title, a.summary, a.location_address, a.organizer, ...(a.tags || [])]
        .filter(Boolean).join(" ").toLowerCase();
      if (!hay.includes(q)) return false;
    }
    if (city && a.location_city !== city) return false;
    if (freeOnly && !a.is_free) return false;
    if (datedOnly && !a.date_start) return false;
    if (age !== null) {
      if (a.age_min != null && a.age_min > age) return false;
      if (a.age_max != null && a.age_max < age) return false;
    }
    if (tags.length && !tags.some(t => (a.tags || []).includes(t))) return false;
    return true;
  });

  const sort = $("sort").value;
  if (sort === "date") {
    view.sort((x, y) => (x.date_start || "9999") < (y.date_start || "9999") ? -1 : 1);
  } else if (sort === "price") {
    view.sort((x, y) => (x.price ?? 1e9) - (y.price ?? 1e9));
  } else {
    view.sort((x, y) => x._rank - y._rank);
  }

  $("count").textContent = view.length;
  render(true);
}

function render(reset) {
  const grid = $("grid");
  if (reset) { grid.innerHTML = ""; shown = 0; }
  const slice = view.slice(shown, shown + PAGE_SIZE);
  slice.forEach((a, i) => grid.appendChild(card(a, i)));
  shown += slice.length;
  $("moreRow").hidden = shown >= view.length;
  $("message").innerHTML = view.length ? "" :
    `<div class="empty"><span class="face">🧸</span>沒有符合條件的活動，放寬一點試試？</div>`;
}

const esc = s => String(s ?? "").replace(/[&<>"]/g,
  c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

function card(a, i) {
  const el = document.createElement("article");
  el.className = "card";
  el.style.animationDelay = (Math.min(i, 12) * 35) + "ms";

  // 日期方塊
  let dateHtml;
  if (a.date_start) {
    const [, m, d] = a.date_start.split("-");
    const range = a.date_end && a.date_end !== a.date_start
      ? `~ ${a.date_end.slice(5).replace("-", "/")}` : "&nbsp;";
    dateHtml = `<div class="date-block"><div class="m">${+m} 月</div><div class="d">${+d}</div><div class="range">${range}</div></div>`;
  } else {
    dateHtml = `<div class="date-block unknown"><div class="m">日期</div><div class="d">常駐<br>體驗</div></div>`;
  }

  // 價格貼紙
  const sticker = a.is_free
    ? `<div class="free-sticker">免費</div>`
    : (a.price != null ? `<div class="price-sticker">$${a.price}</div>` : "");

  // 年齡
  const ageText = a.age_min != null
    ? `${a.age_min}${a.age_max != null ? "~" + a.age_max : "+"} 歲`
    : "年齡未標示";

  const tagHtml = (a.tags || []).map(t =>
    `<span class="tag" style="background:${TAG_COLORS[t] || "var(--paper-deep)"};color:${t in TAG_COLORS && t !== "室內" ? "var(--card)" : "var(--ink)"}">${esc(t)}</span>`
  ).join("");

  const place = [a.location_city, a.location_address].filter(Boolean);
  const placeHtml = place.length
    ? `<span class="city-tag">${esc(place[0])}</span>${place[1] && place[1] !== place[0] ? " " + esc(place[1].slice(0, 30)) : ""}`
    : "地點請見活動頁";

  el.innerHTML = `
    ${sticker}
    <div class="card-top">
      ${dateHtml}
      <h3><a href="${esc(a.url)}" target="_blank" rel="noopener">${esc(a.title)}</a></h3>
    </div>
    <div class="meta">
      <div class="line"><span class="ico">📍</span><span>${placeHtml}</span></div>
      <div class="line"><span class="ico">🎈</span><span>${ageText}</span></div>
      ${a.organizer ? `<div class="line"><span class="ico">🏠</span><span>${esc(a.organizer)}</span></div>` : ""}
    </div>
    <div class="tag-list">${tagHtml}</div>
    <div class="card-foot">
      <span>來源：${esc(a.source)}</span>
      <a class="go-link" href="${esc(a.url)}" target="_blank" rel="noopener">前往報名 →</a>
    </div>`;
  return el;
}

load();
</script>
</body>
</html>
